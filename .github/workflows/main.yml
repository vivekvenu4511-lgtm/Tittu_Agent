name: CI – build & test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest            # the GitHub runner (a fresh Ubuntu VM)

    steps:
      # ── checkout source ───────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── set up Node (used for Vite) ─────────────────────────────
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── install npm dependencies ─────────────────────────────────
      - name: Install npm dependencies
        run: npm ci

      # ── build the Vite frontend (produces ./dist) ───────────────
      - name: Build Vite frontend
        run: npm run build

      # ── install Rust toolchain (needed by Tauri) ────────────────
      - name: Install Rust (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      # ── install Linux native libs required by Tauri ─────────────
      - name: Install Linux build deps for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \   # <-- fixed package name for Ubuntu 24.04
            patchelf

      # ── finally build the Tauri desktop binary ───────────────────
      - name: Build Tauri app
        run: npm run tauri-build
