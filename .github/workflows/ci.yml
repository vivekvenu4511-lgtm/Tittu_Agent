name: CI – build & test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install npm dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test -- --run

  build:
    runs-on: ubuntu-latest
    needs: lint-test
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Vite frontend
        run: npm run build

      - name: Install Rust (stable)
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install Linux build deps for Tauri (Ubuntu 24.04)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            libclang-dev \
            clang

      - name: Build Tauri app with GGUF support
        run: npm run tauri-build
        env:
          TAURI_FEATURES: gguf

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tittu-agent
          path: src-tauri/target/release/bundle/
